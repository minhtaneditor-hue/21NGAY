<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận 25 Hooks Cực Mạnh - Minh Tấn | Video Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .magnet-container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 20, 0.9);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(245, 188, 27, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .magnet-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 188, 27, 0.05) 0%, transparent 70%);
            z-index: 0;
        }
        .magnet-content {
            position: relative;
            z-index: 1;
        }
        .badge {
            background: rgba(245, 188, 27, 0.1);
            color: #f5bc1b;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            line-height: 1.3;
            margin-bottom: 20px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.desc {
            color: #aaa;
            font-size: 1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 15px;
            background: #151515;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #f5bc1b;
            background: #1a1a1a;
        }
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: #f5bc1b;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(245, 188, 27, 0.3);
            background: #ffc83d;
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .footer-note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #555;
        }
        .footer-note span {
            color: #f5bc1b;
        }
    </style>
</head>
<body>

    <div class="magnet-container">
        <div class="magnet-content">
            <div class="badge">Quà Tặng Giới Hạn</div>
            <h1>BỘ 25 HOOKS<br><span style="color: #f5bc1b; -webkit-text-fill-color: #f5bc1b;">BỨT PHÁ DOANH THU</span></h1>
            <p class="desc">Công thức giữ người xem trong 3 giây đầu tiên giúp video của bạn trở thành bộ máy bán hàng tự động.</p>

            <form id="magnet-form">
                <div class="form-group">
                    <label>Họ và tên của bạn</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên..." required>
                </div>
                <div class="form-group">
                    <label>Email nhận tài liệu</label>
                    <input type="email" id="email" name="email" placeholder="Địa chỉ email chính xác..." required>
                </div>
                <button type="submit" id="submit-btn" class="btn-submit">Nhận Tài Liệu & Tham Gia Skool →</button>
            </form>

            <p class="footer-note">Tài liệu sẽ được gửi về Email. Bạn sẽ được chuyển hướng tới <span>Skool Classroom</span> để học ngay.</p>
        </div>
    </div>

    <script>
        document.getElementById('magnet-form').onsubmit = async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            btn.innerText = "Đang xử lý...";
            btn.disabled = true;

            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'submit-freebie',
                        fullname: fullname,
                        email: email
                    })
                });

                const result = await response.json();

                if (result.success) {
                    btn.innerText = "Đang chuyển hướng...";
                    // Tự động chuyển hướng tới Skool
                    setTimeout(() => {
                        window.location.href = result.skool_url;
                    }, 1000);
                } else {
                    alert("Có lỗi xảy ra, vui lòng thử lại.");
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Lỗi:", error);
                alert("Không thể kết nối với hệ thống.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
